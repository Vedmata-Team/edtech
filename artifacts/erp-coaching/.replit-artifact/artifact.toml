kind = "web"
previewPath = "/"
title = "Coaching ERP SaaS"
version = "1.0.0"
id = "artifacts/erp-coaching"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18431

[services.development]
run = "pnpm --filter @workspace/erp-coaching run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-coaching", "run", "build" ]
publicDir = "artifacts/erp-coaching/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18431"
BASE_PATH = "/"
