[build]
  command   = "vite build --config vite.config.ts"
  publish   = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# Custom domain
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
